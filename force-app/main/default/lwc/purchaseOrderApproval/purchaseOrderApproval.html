<template>
    <lightning-card class="slds-p-around_x-small">
        <div>
            <h1>Purchase Order Approval</h1>
            <p>Current Status : {currentStatus}</p>
            <p>Current Approver : {currentApprover}</p>
            <template lwc:if={isApprover}>
                <lightning-button variant="destructive" label="Reject" class="slds-m-left_x-small" onclick={handleReject}></lightning-button>
                <lightning-button variant="success" label="Approve"
                class="slds-m-left_x-small" onclick={handleApprove}
                ></lightning-button>
            </template>
            <template lwc:if={showModal}>
                <div>
                    <p>Are you sure you want to {pendingAction} this record?</p>
                    <lightning-button label="Confirm" onclick={handleConfirm}></lightning-button>
                    <lightning-button label="Cancel" onclick={handleCancel}></lightning-button>
                </div>
            </template>
        </div>
        <div >
            <h1>Approval Timeline</h1>
            <template lwc:if={hasTimeline}>
                <template for:each={approvalDetails.previousSteps} for:item="step">
                    <div key = {step.Id}>
                        <p>Status : {step.StepStatus}</p>
                        <p>Submitted By : {step.ProcessInstance.SubmittedById}</p>
                        <p>Date : {step.CreatedDate}</p>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
