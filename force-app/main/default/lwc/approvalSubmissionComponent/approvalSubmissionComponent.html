<template>
    <lightning-card title="Purchase Order Details" icon-name="standard:orders">
        <div class="slds-p-around_medium">

            <!-- PO Details Section -->
            <div class="slds-box slds-theme_default">
                <h2 class="slds-text-heading_small slds-m-bottom_medium">
                    PO Details
                </h2>

                <div class="slds-grid slds-wrap">

                    <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                        <p class="slds-text-title_bold">PO Number</p>
                        <p>{name}</p>
                    </div>

                    <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                        <p class="slds-text-title_bold">Amount</p>
                        <p>{amount}</p>
                    </div>

                    <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                        <p class="slds-text-title_bold">Status</p>
                        <p>{status}</p>
                    </div>

                    <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                        <p class="slds-text-title_bold">Created By</p>
                        <p>{createdBy}</p>
                    </div>

                    <div class="slds-col slds-size_1-of-2">
                        <p class="slds-text-title_bold">Created Date</p>
                        <p>{createdDate}</p>
                    </div>

                </div>
            </div>

            <!-- If record is already pending approval -->
            <template lwc:if={isAlreadyPending}>
                <div class="slds-notify slds-notify_alert slds-theme_warning slds-m-bottom_medium">
                    <h2>
                        <strong>Already Pending Approval</strong><br/>
                        This record has already been submitted and is waiting for approval.
                        No action needed.
                    </h2>
                </div>
            </template>

            <!-- Submission Comments -->
            <template lwc:if={showComments}>
                <div class="slds-m-top_large">
                    <lightning-textarea
                        label="Submission Comments (Optional)"
                        placeholder="Enter comments for approver..."
                        value={submissionComments}
                        onchange={handleCommentsChange}>
                    </lightning-textarea>
                </div>
            </template>

            <!-- If submission is successfull -->
            <template lwc:if={isSubmissionSuccess}>
                <div class="slds-notify slds-notify_alert slds-theme_success slds-m-bottom_medium"
                    role="alert">
                    <span class="slds-assistive-text">Success</span>

                    <div>
                        <h2 class="slds-text-heading_small slds-m-bottom_x-small">
                            Successfully Submitted for Approval
                        </h2>
                        <p>
                            Your PO has been submitted and is now awaiting approval.
                            Moving to next step...
                        </p>
                    </div>
                </div>
            </template>
            
            <!-- Loading spinner -->
            <template lwc:if={isLoading}>
                <lightning-spinner
                    alternative-text="Submitting for Approval"
                    size="medium">
                </lightning-spinner>
            </template>

            <!-- Submit Button -->
            <div class="slds-m-top_large slds-align_absolute-center">
                <lightning-button
                    variant="brand"
                    label={submitButtonLabel}
                    onclick={handleSubmit}
                    disabled={isSubmitDisabled}
                    >

                </lightning-button>
            </div>

        </div>
    </lightning-card>
</template>
